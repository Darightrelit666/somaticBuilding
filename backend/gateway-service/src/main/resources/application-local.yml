server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/user/**
        - id: exercise-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/exercise/**
        - id: workout-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/workout/**
        - id: training-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/training/**
        - id: assessment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/assessment/**
        - id: profile-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/ability/**
        - id: ai-assistant-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/assistant/**
