<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Stretching exercise placeholder</title>
  <desc id="desc">Abstract stretching and mobility artwork used as a local fallback image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <ellipse cx="1000" cy="170" rx="170" ry="120" fill="#fbbf24" opacity="0.12"/>
  <ellipse cx="200" cy="730" rx="190" ry="150" fill="#f59e0b" opacity="0.1"/>
  <g transform="translate(180 500)">
    <path d="M0 120 C130 -90 360 -90 470 120 C560 290 790 290 900 120" fill="none" stroke="url(#flow)" stroke-width="28" stroke-linecap="round"/>
    <circle cx="470" cy="120" r="26" fill="#fef3c7"/>
    <path d="M470 146 C470 230 520 265 585 280" fill="none" stroke="#fde68a" stroke-width="18" stroke-linecap="round"/>
  </g>
  <text x="180" y="170" fill="#fde68a" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="700">STRETCHING</text>
  <text x="180" y="238" fill="#fcd34d" font-family="Arial, Helvetica, sans-serif" font-size="32" letter-spacing="2">SOMATIC BUILDING</text>
</svg>
