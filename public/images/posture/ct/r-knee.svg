<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 920' preserveAspectRatio='xMidYMid slice'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='#0a0d12'/>
      <stop offset='55%' stop-color='#0f141a'/>
      <stop offset='100%' stop-color='#06080d'/>
    </linearGradient>
    <radialGradient id='scanGlow' cx='50%' cy='30%' r='72%'>
      <stop offset='0%' stop-color='#f3f7ff' stop-opacity='0.2'/>
      <stop offset='100%' stop-color='#1d2430' stop-opacity='0'/>
    </radialGradient>
    <filter id='film'>
      <feTurbulence baseFrequency='0.8' numOctaves='2' seed='17' stitchTiles='stitch' type='fractalNoise' result='noise'/>
      <feColorMatrix in='noise' type='saturate' values='0'/>
      <feComponentTransfer>
        <feFuncA type='table' tableValues='0 0.045'/>
      </feComponentTransfer>
    </filter>
    <filter id='blur'><feGaussianBlur stdDeviation='1.8'/></filter>
  </defs>

  <rect width='640' height='920' fill='url(#bg)'/>
  <rect width='640' height='920' fill='url(#scanGlow)'/>
  <rect width='640' height='920' filter='url(#film)'/>

  <g stroke='#c8d0de' stroke-opacity='0.45' fill='none' stroke-width='2'>
    <ellipse cx='320' cy='112' rx='66' ry='80'/>
    <path d='M320 192 L320 484'/>
    <path d='M250 256 C286 234 354 234 390 256'/>
    <path d='M252 250 L205 372 L182 475'/>
    <path d='M388 250 L435 372 L458 475'/>
    <path d='M285 550 L282 708 L282 860'/>
    <path d='M355 550 L358 708 L358 860'/>
    <ellipse cx='320' cy='540' rx='78' ry='48'/>
    <ellipse cx='282' cy='704' rx='34' ry='36'/>
    <ellipse cx='358' cy='704' rx='34' ry='36'/>
  </g>

  <g stroke='#e4ebf7' stroke-opacity='0.13' stroke-width='1'>
    <line x1='108' y1='130' x2='532' y2='130'/>
    <line x1='108' y1='220' x2='532' y2='220'/>
    <line x1='108' y1='310' x2='532' y2='310'/>
    <line x1='108' y1='400' x2='532' y2='400'/>
    <line x1='108' y1='490' x2='532' y2='490'/>
    <line x1='108' y1='580' x2='532' y2='580'/>
    <line x1='108' y1='670' x2='532' y2='670'/>
    <line x1='108' y1='760' x2='532' y2='760'/>
    <line x1='108' y1='850' x2='532' y2='850'/>
  </g>

  <g opacity='0.95'>
    <circle cx='358' cy='704' r='66' fill='#58e0ff' fill-opacity='0.12' filter='url(#blur)'/>
    <circle cx='358' cy='704' r='52' fill='none' stroke='#87ecff' stroke-opacity='0.74' stroke-width='2'/>
    <circle cx='358' cy='704' r='32' fill='none' stroke='#d5fbff' stroke-opacity='0.84' stroke-width='2'/>
    <circle cx='358' cy='704' r='5' fill='#f0fdff'/>
  </g>

  <g fill='#eaf3ff' font-family='monospace' font-size='18' letter-spacing='2'>
